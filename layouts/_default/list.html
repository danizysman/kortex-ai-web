{{ define "main" }}
<div class="max-w-4xl mx-auto px-6 py-20">
    <h1 class="text-4xl font-extrabold text-white mb-12">{{ .Title }}</h1>
    <div class="space-y-12">
        {{ range .Pages }}
        <div class="border-b border-slate-800 pb-8">
            <h2 class="text-2xl font-bold text-white mb-2">
                <a href="{{ .RelPermalink }}" class="hover:text-kortex-blue transition-colors">{{ .Title }}</a>
            </h2>
            <p class="text-slate-400 text-sm leading-relaxed mb-4">{{ .Params.context }}</p>
            <a href="{{ .RelPermalink }}" class="text-kortex-blue hover:underline text-sm font-semibold">Read Case Study
                &rarr;</a>
        </div>
        {{ end }}
    </div>
</div>
{{ end }}
