<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <!-- Google tag (gtag.js) -->
    {{ if hugo.IsProduction }}
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-H1851LMRJE"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-H1851LMRJE');
    </script>
    {{ else }}
    <script>
        // Mock gtag for local development to prevent errors on click events
        function gtag(){ console.log('Google Analytics Event (Mocked):', arguments); }
    </script>
    {{ end }}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/svg+xml" href="/logo.svg">
    <link rel="apple-touch-icon" href="/logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kortex: {
                            bg: '#0f172a',
                            blue: '#38bdf8',
                            gray: '#e2e8f0',
                            dark: '#1e293b'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-kortex-bg text-kortex-gray font-sans antialiased selection:bg-kortex-blue selection:text-white">

    <!-- Navigation -->
    <nav class="max-w-6xl mx-auto px-6 py-8 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <!-- Inline SVG Logo -->
            <a href="/" class="flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" class="w-10 h-10">
                    <rect width="400" height="400" fill="#0f172a" rx="40"/>
                    <path d="M120 100 L160 100 L160 300 L120 300 Z" fill="#38bdf8"/>
                    <path d="M160 200 L270 100 L310 100 L200 200 L310 300 L270 300 Z" fill="#e2e8f0"/>
                    <circle cx="260" cy="200" r="14" fill="#38bdf8"/>
                </svg>
                <span class="text-xl font-bold tracking-tight text-white">Kortex Intelligence</span>
            </a>
        </div>
        <a href="mailto:daniel@kortexintelligence.com" onclick="gtag('event', 'generate_lead', { 'event_category': 'Contact', 'event_label': 'Email_Directly_Button' });" class="text-sm font-semibold text-kortex-gray hover:text-kortex-blue transition-colors">
            daniel@kortexintelligence.com
        </a>
    </nav>

    {{ block "main" . }}{{ end }}

    <!-- Footer -->
    <footer class="max-w-6xl mx-auto px-6 py-8 border-t border-slate-800 flex flex-col md:flex-row justify-between items-center gap-4 text-center md:text-left">
        <div class="text-slate-500 text-sm">
            <strong>Kortex AI LLC</strong> | Wyoming, US | Operating from Argentina (UTC-3)
        </div>
        <div class="flex items-center gap-5">
            <a href="https://github.com/danizysman" target="_blank" class="text-slate-500 hover:text-kortex-blue transition-colors" aria-label="GitHub">
                <svg role="img" viewBox="0 0 24 24" class="w-5 h-5 fill-current" xmlns="http://www.w3.org/2000/svg">
                    <title>GitHub</title>
                    <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
                </svg>
            </a>
            <a href="https://www.linkedin.com/in/dzysman/" target="_blank" class="text-slate-500 hover:text-kortex-blue transition-colors" aria-label="LinkedIn">
                <svg role="img" viewBox="0 0 24 24" class="w-5 h-5 fill-current" xmlns="http://www.w3.org/2000/svg">
                    <title>LinkedIn</title>
                    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                </svg>
            </a>
            <a href="mailto:daniel@kortexintelligence.com" class="text-slate-500 hover:text-kortex-blue transition-colors" aria-label="Email">
                <svg role="img" viewBox="0 0 24 24" class="w-5 h-5 fill-current" xmlns="http://www.w3.org/2000/svg">
                    <title>Gmail</title>
                    <path d="M24 5.457v13.909c0 .904-.732 1.636-1.636 1.636h-3.819V11.73L12 16.64l-6.545-4.91v9.273H1.636A1.636 1.636 0 0 1 0 19.366V5.457c0-2.023 2.309-3.178 3.927-1.964L5.455 4.64 12 9.548l6.545-4.91 1.528-1.145C21.69 2.28 24 3.434 24 5.457z"/>
                </svg>
            </a>
        </div>
    </footer>

</body>
</html>
